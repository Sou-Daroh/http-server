name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Setup Go environment
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        cache: true

    - name: Download Go dependencies
      run: go mod download

    - name: Execute Server Benchmarks & Tests
      # Verifies the Go code natively compiles and performs without regressions
      run: go test -v -bench=. ./bench

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Verify Architecture Deployment (Docker Compose Dry-Run)
      # Simulates launching the exact production architecture (Postgres + Gin API container)
      run: docker-compose build
