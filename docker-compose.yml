version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: overwatch_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: honeypot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  api:
    build: .
    container_name: overwatch_api
    environment:
      - DB_DSN=postgres://admin:supersecretpassword@db:5432/honeypot?sslmode=disable
      - JWT_SECRET=OverwatchSuperSecretSyllabusKey99!
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: always

volumes:
  pgdata:
